services:
  - type: web
    name: away-api
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install
    startCommand: node server/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 22.12.0
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES
        value: 8h
      - key: ADMIN_USER
        value: admin
      - key: ADMIN_PASS
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: DATABASE_URL
        sync: false
